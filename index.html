<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Визуальная новелла</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Экран меню -->
    <div id="menu" class="screen">
        <h1>Первая встреча</h1>
    <div class="buttons">
        <button id="start-btn">▶ Начать</button>
        <button id="exit-btn">✕ Выход</button>
    </div>
    </div>

    <!-- Экран уровней -->
    <div id="levels" class="screen">
    <h2 style="color:#fff; margin-bottom:20px; text-align:center;">🗺️ Выберите уровень</h2>
        
        <div class="map">
            <div class="node unlocked" data-level="1">
                <div class="circle">1</div>
                <span>Парк</span>
            </div>
            <div class="line"></div>
            <div class="node locked" data-level="2">
                <div class="circle">2</div>
                <span>Больница</span>
            </div>
            <div class="line"></div>
            <div class="node locked" data-level="3">
                <div class="circle">3</div>
                <span>Итог</span>
            </div>
        </div>
    <div class="back-container">
        <button id="back-btn">← Назад</button>
    </div>
    </div>

    <!-- Экран игры -->
    <div id="game" class="screen">
        <img id="background" alt="">
        <img id="character" alt="">
        <div id="dialog">
            <div id="text"></div>
            <div id="choices"></div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
